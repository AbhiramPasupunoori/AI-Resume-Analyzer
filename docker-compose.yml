services:
  postgres:
    image: postgres:17-alpine
    container_name: resume-analyzer-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: resume_analyzer
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_password

    ports:
      - "5432:5432"

    volumes:
      - resume_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U resume_user -d resume_analyzer"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  resume_postgres_data: